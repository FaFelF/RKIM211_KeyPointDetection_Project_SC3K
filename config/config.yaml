Paper: SC3K -- Self-supervised and Coherent 3D Keypoints Estimation from Rotated, Noisy, and Decimated Point Cloud Data (ICCV-2023)

split: test # train, val, test
task: generic # generic or canonical
key_points: 10
batch_size: 8
max_epoch: 100
num_workers: 12
class_name: airplane
overlap_threshold: 0.05 # 0.05

save_results: True

exp_tag: baseline 


parameters:
  separation:  1
  overlap:    1
  shape:     6 
  consist:    1 
  volume:    1 
  pose:    0.07 


augmentation:
  translation: False
  rot_gravity: False
  normalize_pc: True
  gaussian_noise: False
  down_sample: False


lamda: 0 #0.01
lamda2:  0 # 0.02
sample_points:  2048


data:
  annot_path: "/path/to/KeypointNet_SC3K/annotations/${class_name}.json"
  pcd_root: "/path/to/KeypointNet_SC3K/pcds"
  splits_root: "/path/to/KeypointNet_SC3K/splits"
  poses_root: "/path/to/KeypointNet_SC3K_sphere_poses"
  best_model_path: models/airplane/sphere_poses/Best_airplane_10kp.pth


hydra:
  run:
    dir: runs/${now:%Y-%m-%d_%H-%M-%S}_${class_name}_${exp_tag}_${split}

